name: Xcode App Store Build

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: Upload the exported IPA to App Store Connect
        required: true
        type: boolean
        default: true
      build_number:
        description: Optional CFBundleVersion override
        required: false
        type: string
  push:
    branches:
      - main
    paths:
      - ".github/workflows/xcode-appstore.yml"
      - "FieldOps IQ.xcodeproj/**"
      - "FieldOpsIQ/**"

concurrency:
  group: xcode-appstore-${{ github.ref }}
  cancel-in-progress: true

jobs:
  archive:
    name: Archive and Upload
    runs-on: macos-15
    timeout-minutes: 45

    env:
      APP_NAME: FieldOps IQ
      BUNDLE_ID: com.fieldopsiq.app
      PROJECT_PATH: FieldOps IQ.xcodeproj
      SCHEME: FieldOps IQ
      CONFIGURATION: Release
      # Primary secret names. The shell steps below also accept the alias names
      # listed in docs/github-actions-secrets.md if those were uploaded instead.
      APPLE_TEAM_ID_SECRET: ${{ secrets.APPLE_TEAM_ID }}
      DEVELOPMENT_TEAM_SECRET: ${{ secrets.DEVELOPMENT_TEAM }}
      BUILD_CERTIFICATE_BASE64_SECRET: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      IOS_CERTIFICATE_BASE64_SECRET: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      P12_BASE64_SECRET: ${{ secrets.P12_BASE64 }}
      P12_PASSWORD_SECRET: ${{ secrets.P12_PASSWORD }}
      CERTIFICATE_PASSWORD_SECRET: ${{ secrets.CERTIFICATE_PASSWORD }}
      IOS_CERTIFICATE_PASSWORD_SECRET: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      BUILD_PROVISION_PROFILE_BASE64_SECRET: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
      IOS_PROVISION_PROFILE_BASE64_SECRET: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
      MOBILEPROVISION_BASE64_SECRET: ${{ secrets.MOBILEPROVISION_BASE64 }}
      KEYCHAIN_PASSWORD_SECRET: ${{ secrets.KEYCHAIN_PASSWORD }}
      APP_STORE_CONNECT_API_KEY_ID_SECRET: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_KEY_ID_SECRET: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      ASC_KEY_ID_SECRET: ${{ secrets.ASC_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID_SECRET: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_ISSUER_ID_SECRET: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      ASC_ISSUER_ID_SECRET: ${{ secrets.ASC_ISSUER_ID }}
      APP_STORE_CONNECT_API_PRIVATE_KEY_SECRET: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
      APP_STORE_CONNECT_PRIVATE_KEY_SECRET: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      ASC_PRIVATE_KEY_SECRET: ${{ secrets.ASC_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show build tools
        run: |
          set -euo pipefail
          xcodebuild -version
          xcode-select -p

      - name: Resolve secret aliases
        run: |
          set -euo pipefail

          first_present() {
            for value in "$@"; do
              if [ -n "${value}" ]; then
                printf "%s" "${value}"
                return 0
              fi
            done
            return 0
          }

          TEAM_ID="$(first_present "${APPLE_TEAM_ID_SECRET}" "${DEVELOPMENT_TEAM_SECRET}")"
          CERTIFICATE_BASE64="$(first_present "${BUILD_CERTIFICATE_BASE64_SECRET}" "${IOS_CERTIFICATE_BASE64_SECRET}" "${P12_BASE64_SECRET}")"
          CERTIFICATE_PASSWORD="$(first_present "${P12_PASSWORD_SECRET}" "${CERTIFICATE_PASSWORD_SECRET}" "${IOS_CERTIFICATE_PASSWORD_SECRET}")"
          PROFILE_BASE64="$(first_present "${BUILD_PROVISION_PROFILE_BASE64_SECRET}" "${IOS_PROVISION_PROFILE_BASE64_SECRET}" "${MOBILEPROVISION_BASE64_SECRET}")"
          KEYCHAIN_PASSWORD="$(first_present "${KEYCHAIN_PASSWORD_SECRET}" "$(uuidgen)")"
          ASC_KEY_ID="$(first_present "${APP_STORE_CONNECT_API_KEY_ID_SECRET}" "${APP_STORE_CONNECT_KEY_ID_SECRET}" "${ASC_KEY_ID_SECRET}")"
          ASC_ISSUER_ID="$(first_present "${APP_STORE_CONNECT_API_ISSUER_ID_SECRET}" "${APP_STORE_CONNECT_ISSUER_ID_SECRET}" "${ASC_ISSUER_ID_SECRET}")"
          ASC_PRIVATE_KEY="$(first_present "${APP_STORE_CONNECT_API_PRIVATE_KEY_SECRET}" "${APP_STORE_CONNECT_PRIVATE_KEY_SECRET}" "${ASC_PRIVATE_KEY_SECRET}")"

          HAS_MANUAL_SIGNING=false
          if [ -n "${CERTIFICATE_BASE64}" ] && [ -n "${CERTIFICATE_PASSWORD}" ] && [ -n "${PROFILE_BASE64}" ]; then
            HAS_MANUAL_SIGNING=true
          fi

          HAS_ASC_PRIVATE_KEY=false
          if [ -n "${ASC_KEY_ID}" ] && [ -n "${ASC_ISSUER_ID}" ] && [ -n "${ASC_PRIVATE_KEY}" ]; then
            HAS_ASC_PRIVATE_KEY=true
          fi

          if [ "${HAS_MANUAL_SIGNING}" = "true" ]; then
            SIGNING_MODE=manual
          elif [ "${HAS_ASC_PRIVATE_KEY}" = "true" ]; then
            SIGNING_MODE=api-generated
          else
            SIGNING_MODE=missing
          fi

          missing=()
          [ -n "${TEAM_ID}" ] || missing+=("APPLE_TEAM_ID or DEVELOPMENT_TEAM")
          if [ "${SIGNING_MODE}" = "missing" ]; then
            missing+=("either App Store Connect API key secrets for automatic signing or certificate/profile secrets for manual signing")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            printf "Missing required signing secret(s):\n"
            printf " - %s\n" "${missing[@]}"
            exit 1
          fi

          {
            echo "TEAM_ID=${TEAM_ID}"
            echo "KEYCHAIN_PASSWORD=${KEYCHAIN_PASSWORD}"
            echo "ASC_KEY_ID=${ASC_KEY_ID}"
            echo "ASC_ISSUER_ID=${ASC_ISSUER_ID}"
            echo "HAS_ASC_PRIVATE_KEY=${HAS_ASC_PRIVATE_KEY}"
            echo "SIGNING_MODE=${SIGNING_MODE}"
            echo "CERTIFICATE_BASE64<<__CERT__"
            echo "${CERTIFICATE_BASE64}"
            echo "__CERT__"
            echo "CERTIFICATE_PASSWORD<<__CERT_PASSWORD__"
            echo "${CERTIFICATE_PASSWORD}"
            echo "__CERT_PASSWORD__"
            echo "PROFILE_BASE64<<__PROFILE__"
            echo "${PROFILE_BASE64}"
            echo "__PROFILE__"
            echo "ASC_PRIVATE_KEY<<__ASC_KEY__"
            printf "%s\n" "${ASC_PRIVATE_KEY}"
            echo "__ASC_KEY__"
          } >> "${GITHUB_ENV}"

      - name: Install signing assets
        run: |
          set -euo pipefail

          if [ "${SIGNING_MODE}" != "manual" ]; then
            echo "Using App Store Connect API-generated signing assets; skipping uploaded certificate/profile import."
            exit 0
          fi

          CERTIFICATE_PATH="${RUNNER_TEMP}/ios_distribution.p12"
          PROFILE_PATH="${RUNNER_TEMP}/profile.mobileprovision"
          PROFILE_PLIST="${RUNNER_TEMP}/profile.plist"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"

          decode_base64() {
            if ! printf "%s" "$1" | base64 --decode 2>/dev/null; then
              printf "%s" "$1" | base64 -D
            fi
          }

          decode_base64 "${CERTIFICATE_BASE64}" > "${CERTIFICATE_PATH}"
          decode_base64 "${PROFILE_BASE64}" > "${PROFILE_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -P "${CERTIFICATE_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db

          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "${PROFILE_PATH}" > "${PROFILE_PLIST}"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "${PROFILE_PLIST}")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "${PROFILE_PLIST}")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "${PROFILE_PLIST}")

          cp "${PROFILE_PATH}" "${HOME}/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          echo "PROFILE_UUID=${PROFILE_UUID}" >> "${GITHUB_ENV}"
          echo "PROFILE_NAME=${PROFILE_NAME}" >> "${GITHUB_ENV}"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "Installed provisioning profile: ${PROFILE_NAME}"
          echo "Profile application identifier: ${PROFILE_APP_ID}"

      - name: Install App Store Connect API key
        run: |
          set -euo pipefail

          if [ "${HAS_ASC_PRIVATE_KEY}" != "true" ]; then
            echo "No App Store Connect API private key secret found; skipping API key install."
            exit 0
          fi

          if [ -z "${ASC_KEY_ID}" ] || [ -z "${ASC_ISSUER_ID}" ]; then
            echo "APP_STORE_CONNECT API key ID and issuer ID are required when uploading to App Store Connect."
            exit 1
          fi

          mkdir -p "${HOME}/private_keys"
          printf "%s" "${ASC_PRIVATE_KEY}" | sed 's/\\n/\n/g' > "${HOME}/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "${HOME}/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=${HOME}/private_keys/AuthKey_${ASC_KEY_ID}.p8" >> "${GITHUB_ENV}"

      - name: Create signing assets with App Store Connect API
        run: |
          set -euo pipefail

          if [ "${SIGNING_MODE}" != "api-generated" ]; then
            echo "Using uploaded signing assets; skipping App Store Connect signing asset creation."
            exit 0
          fi

          ASC_TOKEN="$(ruby <<'RUBY'
          require "base64"
          require "json"
          require "openssl"

          def base64url(data)
            Base64.urlsafe_encode64(data).delete("=")
          end

          def int_to_fixed_bytes(value, length)
            hex = value.to_i.to_s(16)
            hex = "0#{hex}" if hex.length.odd?
            [hex].pack("H*").rjust(length, "\0")[-length, length]
          end

          key = OpenSSL::PKey.read(File.read(ENV.fetch("ASC_KEY_PATH")))
          now = Time.now.to_i
          header = {
            alg: "ES256",
            kid: ENV.fetch("ASC_KEY_ID"),
            typ: "JWT",
          }
          payload = {
            iss: ENV.fetch("ASC_ISSUER_ID"),
            iat: now,
            exp: now + 900,
            aud: "appstoreconnect-v1",
          }

          signing_input = "#{base64url(header.to_json)}.#{base64url(payload.to_json)}"
          digest = OpenSSL::Digest::SHA256.digest(signing_input)
          der_signature = key.dsa_sign_asn1(digest)
          signature_parts = OpenSSL::ASN1.decode(der_signature).value
          raw_signature = int_to_fixed_bytes(signature_parts[0].value, 32) +
            int_to_fixed_bytes(signature_parts[1].value, 32)

          puts "#{signing_input}.#{base64url(raw_signature)}"
          RUBY
          )"

          SIGNING_KEY_PATH="${RUNNER_TEMP}/github_actions_distribution.key"
          CSR_PATH="${RUNNER_TEMP}/github_actions_distribution.csr"
          CERTIFICATE_CER_PATH="${RUNNER_TEMP}/github_actions_distribution.cer"
          CERTIFICATE_PEM_PATH="${RUNNER_TEMP}/github_actions_distribution.pem"
          CERTIFICATE_P12_PATH="${RUNNER_TEMP}/github_actions_distribution.p12"
          PROFILE_PATH="${RUNNER_TEMP}/github_actions_app_store.mobileprovision"
          PROFILE_PLIST="${RUNNER_TEMP}/github_actions_app_store.plist"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"
          GENERATED_CERT_PASSWORD="$(uuidgen)"

          openssl genrsa -out "${SIGNING_KEY_PATH}" 2048
          openssl req -new -key "${SIGNING_KEY_PATH}" -out "${CSR_PATH}" -subj "/CN=FieldOps IQ GitHub Actions"

          ASC_TOKEN="${ASC_TOKEN}" \
          APP_NAME="${APP_NAME}" \
          BUNDLE_ID="${BUNDLE_ID}" \
          CSR_PATH="${CSR_PATH}" \
          CERTIFICATE_CER_PATH="${CERTIFICATE_CER_PATH}" \
          PROFILE_PATH="${PROFILE_PATH}" \
          GITHUB_RUN_NUMBER="${GITHUB_RUN_NUMBER}" \
          python3 - <<'PY'
          import base64
          import json
          import os
          import pathlib
          import sys
          import urllib.parse
          import urllib.request

          token = os.environ["ASC_TOKEN"]
          base_url = "https://api.appstoreconnect.apple.com/v1"

          class AppStoreConnectError(Exception):
              def __init__(self, status, body):
                  super().__init__(body)
                  self.status = status
                  self.body = body
                  try:
                      self.payload = json.loads(body)
                  except json.JSONDecodeError:
                      self.payload = {}

          def request(method, path, payload=None):
              data = None
              headers = {
                  "Authorization": f"Bearer {token}",
                  "Content-Type": "application/json",
              }
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(base_url + path, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req, timeout=60) as resp:
                      body = resp.read().decode("utf-8")
                      return json.loads(body) if body else {}
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  raise AppStoreConnectError(exc.code, body) from exc

          def create_distribution_certificate():
              csr_content = pathlib.Path(os.environ["CSR_PATH"]).read_text()
              return request("POST", "/certificates", {
                  "data": {
                      "type": "certificates",
                      "attributes": {
                          "certificateType": "IOS_DISTRIBUTION",
                          "csrContent": csr_content,
                      },
                  },
              })

          def is_distribution_certificate_conflict(error):
              if error.status != 409:
                  return False
              for item in error.payload.get("errors", []):
                  detail = item.get("detail", "")
                  if (
                      item.get("code") == "ENTITY_ERROR"
                      and "current iOS Distribution certificate" in detail
                  ):
                      return True
              return False

          def revoke_existing_distribution_certificates():
              query = urllib.parse.urlencode({
                  "filter[certificateType]": "IOS_DISTRIBUTION",
                  "limit": "200",
              })
              certificates = request("GET", f"/certificates?{query}").get("data", [])
              if not certificates:
                  raise RuntimeError("Apple reported an iOS Distribution certificate conflict, but no iOS Distribution certificates were returned.")

              for item in certificates:
                  cert_id = item["id"]
                  attrs = item.get("attributes", {})
                  display_name = attrs.get("displayName") or attrs.get("name") or cert_id
                  expiration = attrs.get("expirationDate", "unknown expiration")
                  print(f"Revoking blocking iOS Distribution certificate {cert_id}: {display_name}, expires {expiration}")
                  request("DELETE", f"/certificates/{cert_id}")

          try:
              certificate = create_distribution_certificate()
          except AppStoreConnectError as error:
              if not is_distribution_certificate_conflict(error):
                  print(error.body, file=sys.stderr)
                  raise
              print("Apple already has a current or pending iOS Distribution certificate; revoking the blocking certificate(s) and retrying.")
              revoke_existing_distribution_certificates()
              certificate = create_distribution_certificate()

          certificate_id = certificate["data"]["id"]
          certificate_content = certificate["data"]["attributes"]["certificateContent"]
          pathlib.Path(os.environ["CERTIFICATE_CER_PATH"]).write_bytes(base64.b64decode(certificate_content))

          identifier = os.environ["BUNDLE_ID"]
          bundle_query = urllib.parse.urlencode({"filter[identifier]": identifier})
          bundles = request("GET", f"/bundleIds?{bundle_query}")
          if bundles["data"]:
              bundle_id = bundles["data"][0]["id"]
          else:
              bundle = request("POST", "/bundleIds", {
                  "data": {
                      "type": "bundleIds",
                      "attributes": {
                          "name": os.environ["APP_NAME"],
                          "identifier": identifier,
                          "platform": "IOS",
                      },
                  },
              })
              bundle_id = bundle["data"]["id"]

          profile_name = f"{os.environ['APP_NAME']} GitHub App Store {os.environ['GITHUB_RUN_NUMBER']}"
          profile = request("POST", "/profiles", {
              "data": {
                  "type": "profiles",
                  "attributes": {
                      "name": profile_name,
                      "profileType": "IOS_APP_STORE",
                  },
                  "relationships": {
                      "bundleId": {
                          "data": {"type": "bundleIds", "id": bundle_id},
                      },
                      "certificates": {
                          "data": [{"type": "certificates", "id": certificate_id}],
                      },
                  },
              },
          })
          profile_content = profile["data"]["attributes"]["profileContent"]
          pathlib.Path(os.environ["PROFILE_PATH"]).write_bytes(base64.b64decode(profile_content))
          PY

          if ! openssl x509 -in "${CERTIFICATE_CER_PATH}" -out "${CERTIFICATE_PEM_PATH}" 2>/dev/null; then
            openssl x509 -inform DER -in "${CERTIFICATE_CER_PATH}" -out "${CERTIFICATE_PEM_PATH}"
          fi

          openssl pkcs12 -export \
            -inkey "${SIGNING_KEY_PATH}" \
            -in "${CERTIFICATE_PEM_PATH}" \
            -out "${CERTIFICATE_P12_PATH}" \
            -password "pass:${GENERATED_CERT_PASSWORD}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_P12_PATH}" -P "${GENERATED_CERT_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db

          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i "${PROFILE_PATH}" > "${PROFILE_PLIST}"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" "${PROFILE_PLIST}")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" "${PROFILE_PLIST}")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print Entitlements:application-identifier" "${PROFILE_PLIST}")

          cp "${PROFILE_PATH}" "${HOME}/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          echo "PROFILE_UUID=${PROFILE_UUID}" >> "${GITHUB_ENV}"
          echo "PROFILE_NAME=${PROFILE_NAME}" >> "${GITHUB_ENV}"
          echo "KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "${GITHUB_ENV}"
          echo "SIGNING_MODE=manual" >> "${GITHUB_ENV}"
          echo "Created App Store provisioning profile: ${PROFILE_NAME}"
          echo "Profile application identifier: ${PROFILE_APP_ID}"

      - name: Archive
        run: |
          set -euo pipefail

          BUILD_NUMBER="${{ inputs.build_number }}"
          if [ -z "${BUILD_NUMBER}" ]; then
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          fi

          ARCHIVE_PATH="${RUNNER_TEMP}/${APP_NAME}.xcarchive"
          echo "ARCHIVE_PATH=${ARCHIVE_PATH}" >> "${GITHUB_ENV}"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "${GITHUB_ENV}"

          common_args=(
            -project "${PROJECT_PATH}"
            -scheme "${SCHEME}"
            -configuration "${CONFIGURATION}"
            -destination "generic/platform=iOS"
            -archivePath "${ARCHIVE_PATH}"
            CURRENT_PROJECT_VERSION="${BUILD_NUMBER}"
            DEVELOPMENT_TEAM="${TEAM_ID}"
            PRODUCT_BUNDLE_IDENTIFIER="${BUNDLE_ID}"
            -skipPackagePluginValidation
            -skipMacroValidation
          )

          xcodebuild clean archive \
            "${common_args[@]}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${PROFILE_NAME}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${KEYCHAIN_PATH}"

      - name: Export IPA
        run: |
          set -euo pipefail

          EXPORT_PATH="${RUNNER_TEMP}/export"
          EXPORT_OPTIONS="${RUNNER_TEMP}/ExportOptions.plist"
          mkdir -p "${EXPORT_PATH}"

          make_export_options() {
            local method="$1"
            if [ "${SIGNING_MODE}" = "manual" ]; then
              cat > "${EXPORT_OPTIONS}" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${method}</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
            else
              cat > "${EXPORT_OPTIONS}" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${method}</string>
            <key>destination</key>
            <string>export</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST
            fi
          }

          export_args=(
            -archivePath "${ARCHIVE_PATH}"
            -exportPath "${EXPORT_PATH}"
            -exportOptionsPlist "${EXPORT_OPTIONS}"
          )

          make_export_options "app-store-connect"
          if ! xcodebuild -exportArchive "${export_args[@]}"; then
            echo "Retrying export with legacy app-store method."
            make_export_options "app-store"
            xcodebuild -exportArchive "${export_args[@]}"
          fi

          IPA_PATH="$(find "${EXPORT_PATH}" -name "*.ipa" -print -quit)"
          if [ -z "${IPA_PATH}" ]; then
            echo "No IPA was produced."
            exit 1
          fi

          echo "IPA_PATH=${IPA_PATH}" >> "${GITHUB_ENV}"
          ls -lh "${IPA_PATH}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: fieldops-iq-${{ env.BUILD_NUMBER }}-ipa
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error

      - name: Upload to App Store Connect
        if: ${{ (github.event_name == 'push' || inputs.upload_to_testflight == true) && env.HAS_ASC_PRIVATE_KEY == 'true' }}
        run: |
          set -euo pipefail

          xcrun altool --upload-app \
            --type ios \
            --file "${IPA_PATH}" \
            --apiKey "${ASC_KEY_ID}" \
            --apiIssuer "${ASC_ISSUER_ID}"

      - name: Explain skipped App Store Connect upload
        if: ${{ (github.event_name == 'push' || inputs.upload_to_testflight == true) && env.HAS_ASC_PRIVATE_KEY != 'true' }}
        run: |
          echo "IPA was built, but upload was skipped because no App Store Connect private key secret was found."
